<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flashcards</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* ── SET GRID ── */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 1.75rem;
      flex-wrap: wrap;
    }

    .toolbar .btn-group {
      margin-left: auto;
      display: flex;
      gap: 0.5rem;
    }

    .search-wrap {
      position: relative;
      flex: 1;
      min-width: 180px;
      max-width: 320px;
    }

    .search-wrap svg {
      position: absolute;
      left: 0.75rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      pointer-events: none;
    }

    .search-wrap input {
      padding-left: 2.25rem;
    }

    .sets-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1rem;
    }

    .set-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.4rem 1.5rem 1.2rem;
      cursor: pointer;
      transition: box-shadow var(--transition), transform var(--transition), border-color var(--transition);
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      position: relative;
      text-decoration: none;
      color: inherit;
    }

    .set-card:hover {
      box-shadow: var(--shadow-md);
      transform: translateY(-2px);
      border-color: #ccc9c2;
    }

    .set-card-title {
      font-family: var(--font-display);
      font-size: 1.1rem;
      color: var(--text);
      letter-spacing: -0.01em;
      line-height: 1.25;
      padding-right: 2.5rem;
    }

    .set-card-desc {
      font-size: 0.82rem;
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .set-card-meta {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-top: 0.4rem;
    }

    .set-card-actions {
      position: absolute;
      top: 1rem;
      right: 1rem;
      display: flex;
      gap: 0.25rem;
      opacity: 0;
      transition: opacity var(--transition);
    }

    .set-card:hover .set-card-actions { opacity: 1; }

    .set-card-actions button {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      width: 30px;
      height: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--text-muted);
      transition: all var(--transition);
    }

    .set-card-actions button:hover { color: var(--text); background: var(--surface-2); }
    .set-card-actions button.danger:hover { color: var(--danger); border-color: var(--danger); background: var(--danger-light); }

    /* ── CREATE MODAL FORM ── */
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
      margin-bottom: 1rem;
    }

    .form-group label {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-muted);
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    /* ── IMPORT AREA ── */
    .import-drop {
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      padding: 2rem;
      text-align: center;
      cursor: pointer;
      transition: all var(--transition);
      color: var(--text-muted);
      font-size: 0.875rem;
    }

    .import-drop:hover, .import-drop.drag-over {
      border-color: var(--accent);
      background: var(--accent-light);
      color: var(--accent);
    }

    .import-drop input { display: none; }
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-brand">
    <span class="dot"></span> Flashcards
  </a>
  <div class="nav-links">
    <button class="theme-toggle" onclick="toggleTheme()" title="Toggle dark mode">
      <span class="theme-toggle-track"></span>
      <span id="theme-label">Dark</span>
    </button>
  </div>
</nav>

<div class="container">
  <div class="page-header">
    <h1>Your Sets</h1>
    <p>All flashcard sets stored locally on this device.</p>
  </div>

  <div class="toolbar">
    <div class="search-wrap">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input type="text" id="search" placeholder="Search sets…" oninput="renderSets()">
    </div>
    <div class="btn-group">
      <button class="btn btn-secondary" onclick="openImportModal()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Import
      </button>
      <button class="btn btn-secondary" onclick="exportAllSets(); toast('All sets exported.');">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        Export All
      </button>
      <button class="btn btn-primary" onclick="openCreateModal()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        New Set
      </button>
    </div>
  </div>

  <div id="sets-grid" class="sets-grid"></div>
</div>

<!-- Create Modal -->
<div id="create-modal" class="modal-overlay" style="display:none" onclick="handleOverlayClick(event, 'create-modal')">
  <div class="modal">
    <h2>New Flashcard Set</h2>
    <div class="form-group">
      <label for="new-title">Title</label>
      <input type="text" id="new-title" placeholder="e.g. Biology Chapter 3" maxlength="100" onkeydown="if(event.key==='Enter') createNewSet()">
    </div>
    <div class="form-group">
      <label for="new-desc">Description <span style="font-weight:400;text-transform:none">(optional)</span></label>
      <input type="text" id="new-desc" placeholder="Short description…" maxlength="200">
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('create-modal')">Cancel</button>
      <button class="btn btn-primary" onclick="createNewSet()">Create Set</button>
    </div>
  </div>
</div>

<!-- Import Modal -->
<div id="import-modal" class="modal-overlay" style="display:none" onclick="handleOverlayClick(event, 'import-modal')">
  <div class="modal">
    <h2>Import Sets</h2>
    <p style="font-size:0.875rem;color:var(--text-muted);margin-bottom:1.25rem">Import a single set or a full Flashcards export bundle (.json).</p>
    <div class="import-drop" id="drop-zone" onclick="document.getElementById('file-input').click()"
         ondragover="handleDragOver(event)" ondragleave="handleDragLeave(event)" ondrop="handleDrop(event)">
      <input type="file" id="file-input" accept=".json" onchange="handleFileSelect(event)">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="margin:0 auto 0.75rem;display:block;opacity:0.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      <strong>Click to choose file</strong> or drag &amp; drop here
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('import-modal')">Close</button>
    </div>
  </div>
</div>

<!-- Delete Confirm Modal -->
<div id="delete-modal" class="modal-overlay" style="display:none" onclick="handleOverlayClick(event, 'delete-modal')">
  <div class="modal">
    <h2>Delete Set?</h2>
    <p id="delete-modal-msg" style="font-size:0.9rem;color:var(--text-muted)"></p>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('delete-modal')">Cancel</button>
      <button class="btn btn-danger" id="delete-confirm-btn">Delete</button>
    </div>
  </div>
</div>

<script src="app.js"></script>
<script>
  let pendingDeleteId = null;

  function renderSets() {
    const grid = document.getElementById('sets-grid');
    const q = document.getElementById('search').value.toLowerCase();
    let sets = getSets().sort((a, b) => b.modified - a.modified);
    if (q) sets = sets.filter(s => s.title.toLowerCase().includes(q) || (s.description || '').toLowerCase().includes(q));

    if (!sets.length) {
      grid.innerHTML = `
        <div class="empty-state" style="grid-column:1/-1">
          <div class="empty-icon">📚</div>
          <h3>${q ? 'No matching sets' : 'No sets yet'}</h3>
          <p>${q ? 'Try a different search.' : 'Create your first flashcard set to get started.'}</p>
          ${!q ? '<button class="btn btn-primary" onclick="openCreateModal()">+ New Set</button>' : ''}
        </div>`;
      return;
    }

    grid.innerHTML = sets.map(s => `
      <a class="set-card" href="study.html?id=${s.id}">
        <div class="set-card-actions">
          <button title="Edit" onclick="event.preventDefault();event.stopPropagation();editSet('${s.id}')">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          </button>
          <button title="Export" onclick="event.preventDefault();event.stopPropagation();exportSet(getSet('${s.id}'))">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          </button>
          <button class="danger" title="Delete" onclick="event.preventDefault();event.stopPropagation();confirmDelete('${s.id}', '${s.title.replace(/'/g, "\\'")}')">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
          </button>
        </div>
        <div class="set-card-title">${escapeHtml(s.title)}</div>
        ${s.description ? `<div class="set-card-desc">${escapeHtml(s.description)}</div>` : ''}
        <div class="set-card-meta">
          <span class="badge">${s.cards.length} card${s.cards.length !== 1 ? 's' : ''}</span>
          <span style="font-size:0.78rem;color:var(--text-muted)">Edited ${formatDate(s.modified)}</span>
        </div>
      </a>
    `).join('');
  }

  function escapeHtml(str) {
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }

  function openCreateModal() {
    document.getElementById('new-title').value = '';
    document.getElementById('new-desc').value = '';
    document.getElementById('create-modal').style.display = 'flex';
    setTimeout(() => document.getElementById('new-title').focus(), 80);
  }

  function openImportModal() {
    document.getElementById('import-modal').style.display = 'flex';
  }

  function closeModal(id) {
    document.getElementById(id).style.display = 'none';
  }

  function handleOverlayClick(e, id) {
    if (e.target.id === id) closeModal(id);
  }

  function createNewSet() {
    const title = document.getElementById('new-title').value.trim();
    if (!title) { document.getElementById('new-title').focus(); return; }
    const desc = document.getElementById('new-desc').value.trim();
    const set = createSet(title, desc);
    saveSet(set);
    closeModal('create-modal');
    window.location.href = `edit.html?id=${set.id}`;
  }

  function editSet(id) {
    window.location.href = `edit.html?id=${id}`;
  }

  function confirmDelete(id, title) {
    pendingDeleteId = id;
    document.getElementById('delete-modal-msg').textContent = `"${title}" and all its cards will be permanently deleted.`;
    document.getElementById('delete-modal').style.display = 'flex';
    document.getElementById('delete-confirm-btn').onclick = () => {
      deleteSet(pendingDeleteId);
      closeModal('delete-modal');
      renderSets();
      toast('Set deleted.');
    };
  }

  // Drag & drop
  function handleDragOver(e) { e.preventDefault(); document.getElementById('drop-zone').classList.add('drag-over'); }
  function handleDragLeave() { document.getElementById('drop-zone').classList.remove('drag-over'); }
  function handleDrop(e) {
    e.preventDefault();
    document.getElementById('drop-zone').classList.remove('drag-over');
    const file = e.dataTransfer.files[0];
    if (file) importFromFile(file, () => { closeModal('import-modal'); renderSets(); });
  }
  function handleFileSelect(e) {
    const file = e.target.files[0];
    if (file) importFromFile(file, () => { closeModal('import-modal'); renderSets(); });
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
      ['create-modal','import-modal','delete-modal'].forEach(closeModal);
    }
  });

  function updateThemeLabel() {
    const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
    const el = document.getElementById('theme-label');
    if (el) el.textContent = isDark ? 'Light' : 'Dark';
  }

  const _origToggleTheme = toggleTheme;
  window.toggleTheme = function() { _origToggleTheme(); updateThemeLabel(); };

  renderSets();
  updateThemeLabel();
</script>
</body>
</html>
